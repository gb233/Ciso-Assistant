name: Repo Guard

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'vk/**'
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block forbidden tracked paths
        shell: bash
        run: |
          set -euo pipefail

          forbidden=(
            '^node_modules/'
            '^\.next/'
            '^test-results/'
            '^playwright-report/'
            '^\.vibe-images/'
            '^\.DS_Store$'
          )

          files=$(git ls-files)
          hit=0
          for rule in "${forbidden[@]}"; do
            if echo "$files" | grep -E "$rule" >/dev/null 2>&1; then
              echo "Forbidden tracked path matched rule: $rule"
              echo "$files" | grep -E "$rule"
              hit=1
            fi
          done

          if [ "$hit" -ne 0 ]; then
            echo "Repository contains forbidden tracked paths."
            exit 1
          fi

      - name: Enforce max file size (50 MB)
        shell: bash
        run: |
          set -euo pipefail
          max_bytes=$((50 * 1024 * 1024))

          oversized=$(git ls-tree -r -l HEAD | awk -v max="$max_bytes" '$4 > max {printf("%s\t%s\n", $4, $5)}')

          if [ -n "$oversized" ]; then
            echo "Found files larger than 50MB:"
            echo "$oversized"
            exit 1
          fi

          echo "File size guard passed."
